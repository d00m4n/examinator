<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f3f3;  /* Aquest és un color gris clar similar al de la web de reus.cat */
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;  /* Aquest és el color blanc del fons del formulari a la web de reus.cat */
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1);
            margin-top: 20px;  /* Afegeix una mica d'espai entre la imatge i el formulari */
        }
        .error {
            color: red;
        }
        input[type="submit"] {
            background-color: #8c2a42; /* Aquest és el color corporatiu de l'Ajuntament de Reus */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 12px;  /* Afegeix arrodoniment al botó */
        }

    </style>
    <link rel="stylesheet" type="text/css" href="/static/styles.css">
</head>
<body>
    <img src="/static/logo.jpg" alt="Logo de l'Ajuntament de Reus">  <!-- Afegeix el logo de l'Ajuntament de Reus fora del formulari -->
    <form method="POST">
        <label for="dni">USUARI:</label><br>
        <input type="text" id="dni" name="dni"><br>
        <input type="submit" value="Enviar">
    </form>
    {% if error %}
        <p class="error" id="error">{{ error }}</p>
        <script>
            setTimeout(function() {
                document.getElementById('error').style.display = 'none';
            }, 5000);
        </script>
    {% endif %}
</body>
</html>
